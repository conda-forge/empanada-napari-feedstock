{% set name = "empanada-napari" %}
{% set version = "1.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 4b24c3ea044e51e2f8d5f9b2ac372855edf53e942d637474c8de2aa80aea7c98

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python >=3.7
    - setuptools-scm
  run:
    - empanada-dl >=0.1.7
    - imagecodecs
    - napari >=0.4.16
    - napari-plugin-engine >=0.1.4
    - python >=3.7
    - scikit-image >=0.19
    - numpy <1.23.0a0

test:
  imports:
    - empanada_napari
  commands:
    - pip list
    - pip check || true # Fails due to opencv-python-headless
  requires:
    - pip

about:
  home: https://github.com/volume-em/empanada-napari
  summary: Napari plugin of algorithms for Panoptic Segmentation of organelles in EM
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - goanpeca
    - jaimergp
